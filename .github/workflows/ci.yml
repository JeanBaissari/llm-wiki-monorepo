name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Check Python scripts syntax
        run: |
          for f in skill/scripts/*.py; do
            python3 -c "import py_compile; py_compile.compile('$f', doraise=True)"
          done

      - name: Install npm dependencies
        run: npm install

      - name: TypeScript build graph-engine
        run: cd graph-engine && npx tsc

      - name: TypeScript build mcp-server
        run: cd mcp-server && npx tsc

      - name: Build audit-shared
        run: cd audit-shared && npm run build

      - name: Scaffold test wiki
        run: python3 skill/scripts/scaffold.py /tmp/ci-test "CI Test" --template codebase --force

      - name: Lint test wiki
        run: python3 skill/scripts/lint_wiki.py /tmp/ci-test

      - name: Graph-engine build test
        run: node graph-engine/dist/index.js --wiki /tmp/ci-test --action build

      - name: Graph-engine insights test
        run: node graph-engine/dist/index.js --wiki /tmp/ci-test --action insights

      - name: Graph insights Python test
        run: python3 skill/scripts/graph_insights.py /tmp/ci-test --format markdown
