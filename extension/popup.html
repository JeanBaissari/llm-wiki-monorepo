<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LLM Wiki Clipper</title>
  <style>
    body { width: 320px; padding: 16px; font-family: system-ui; font-size: 14px; }
    h2 { margin: 0 0 12px 0; font-size: 16px; }
    label { display: block; margin-bottom: 4px; font-weight: 600; }
    input, select { width: 100%; padding: 6px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 8px; background: #111; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    button:hover { background: #333; }
    #status { margin-top: 10px; font-size: 12px; color: #666; min-height: 18px; }
    .success { color: #0a0; }
    .error { color: #c00; }
  </style>
</head>
<body>
  <h2>🧠 LLM Wiki Clipper</h2>
  <label for="wikiPath">Wiki path:</label>
  <input type="text" id="wikiPath" placeholder="~/wiki" value="">
  <label for="folder">Save to:</label>
  <select id="folder">
    <option value="raw/articles">raw/articles/</option>
    <option value="raw/papers">raw/papers/</option>
    <option value="raw/notes">raw/notes/</option>
  </select>
  <button id="clipBtn">📋 Clip Current Page</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
